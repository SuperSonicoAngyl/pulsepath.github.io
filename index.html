<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Dad Pulse: Unique DNA</title>
    <style>
        * { touch-action: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #game-wrapper { position: relative; width: 800px; height: 450px; }
        canvas { background: #0a0a0a; border: 2px solid #333; border-radius: 10px; display: block; touch-action: none; }
        #menu, #custom-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(5, 5, 5, 0.98); z-index: 5000; }
        .nav-btn { background: #222; border: 1px solid #00d2ff; color: #00d2ff; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .play-btn { background: #00d2ff; color: #000; border: none; padding: 15px 50px; font-weight: bold; cursor: pointer; border-radius: 4px; margin: 15px; font-size: 18px; z-index: 6000; }
        .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 10px 0; }
        .color-opt { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .locked { filter: grayscale(1) brightness(0.2); cursor: not-allowed !important; }
        .color-opt.active { border-color: white; box-shadow: 0 0 10px white; transform: scale(1.1); }
        .bg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .bg-opt { padding: 6px 10px; border: 1px solid #444; cursor: pointer; border-radius: 4px; background: #111; font-size: 10px; text-align: center; }
        .bg-opt.active { border-color: #00d2ff; color: #00d2ff; box-shadow: 0 0 8px #00d2ff; }

        /* trail selection UI */
        .trail-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 10px 0; }
        .trail-opt { width: 40px; height: 40px; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; background: #222; border-radius: 4px; }
        .trail-opt.locked { filter: grayscale(1) brightness(0.2); cursor: not-allowed !important; }
        .trail-opt.active { border-color: #00d2ff; box-shadow: 0 0 10px #00d2ff; transform: scale(1.1); }

        #cheat-box { margin-top: 15px; display: flex; gap: 5px; }
        #cheat-input { background: #000; border: 1px solid #333; color: #00ffaa; padding: 5px; font-family: monospace; width: 100px; text-align: center; outline: none; }
        #ui { position: absolute; top: 20px; left: 20px; right: 20px; display: none; justify-content: space-between; font-size: 20px; pointer-events: none; z-index: 1000; font-family: monospace; }
        .hidden { display: none !important; }

        @media (max-width: 900px) {
            #game-wrapper { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; border-radius: 0; }
            canvas { width: 100%; height: 100%; border: none; }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="menu">
            <h1 style="color: #00d2ff; letter-spacing: 8px; text-shadow: 0 0 15px #00d2ff;">NEON PULSE</h1>
            <div style="display:flex; align-items:center; gap:20px; margin-bottom:15px;">
                <button class="nav-btn" onclick="changeLevel(-1)">&#9664;</button>
                <div id="level-name" style="width:200px; text-align:center; font-size: 22px;">THE GAUNTLET</div>
                <button class="nav-btn" onclick="changeLevel(1)">&#9654;</button>
            </div>
            <button class="play-btn" id="start-trigger">START ENGINE</button>
            <button class="nav-btn" style="color:#888; border-color:#333;" onclick="toggleCustom(true)">COLLECTION</button>
            <button class="nav-btn" style="color:#888; border-color:#333;" onclick="toggleSettings(true)">SETTINGS</button>
        </div>

        <div id="settings-menu" class="hidden">
            <h2 style="font-size:18px; color:#00d2ff; margin:5px;">SYSTEM CONFIG</h2>
            <div style="margin: 20px; text-align: center; color: #fff;">
                <div style="margin: 15px 0;">
                    <div style="color: #00d2ff; margin-bottom: 5px;">PARTICLE QUALITY</div>
                    <button class="nav-btn" id="quality-low" onclick="setSetting('particleQuality', 'low')" style="margin: 5px;">LOW</button>
                    <button class="nav-btn" id="quality-med" onclick="setSetting('particleQuality', 'medium')" style="margin: 5px;">MED</button>
                    <button class="nav-btn" id="quality-high" onclick="setSetting('particleQuality', 'high')" style="margin: 5px;">HIGH</button>
                </div>
                <div style="margin: 15px 0;">
                    <div style="color: #00d2ff; margin-bottom: 5px;">BACKGROUND FX</div>
                    <button class="nav-btn" id="bg-on" onclick="setSetting('bgEnabled', true)" style="margin: 5px;">ON</button>
                    <button class="nav-btn" id="bg-off" onclick="setSetting('bgEnabled', false)" style="margin: 5px;">OFF</button>
                </div>
                <div style="margin: 15px 0;">
                    <div style="color: #00d2ff; margin-bottom: 5px;">SHADOW GLOW</div>
                    <button class="nav-btn" id="shadow-on" onclick="setSetting('shadowEnabled', true)" style="margin: 5px;">ON</button>
                    <button class="nav-btn" id="shadow-off" onclick="setSetting('shadowEnabled', false)" style="margin: 5px;">OFF</button>
                </div>
            </div>
            <button class="play-btn" onclick="toggleSettings(false)" style="padding:10px 30px;">BACK</button>
        </div>

        <div id="custom-menu" class="hidden">
            <h2 style="font-size:18px; color:#00d2ff; margin:5px;">CUSTOMIZE DATA</h2>
            <div style="display:flex; align-items:center; gap:20px; margin-bottom:15px;">
                <button class="nav-btn" onclick="changeCustomCategory(-1)">&#9664;</button>
                <div id="custom-category-name" style="width:200px; text-align:center; font-size: 22px;">COLORS</div>
                <button class="nav-btn" onclick="changeCustomCategory(1)">&#9654;</button>
            </div>
            <div style="margin-bottom:10px; text-align:center; color:#00d2ff; font-size:14px;">POINTS: <span id="points-display">0</span></div>
            <div id="customGrid" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 10px 0;"></div>
            <div id="cheat-box">
                <input type="text" id="cheat-input" placeholder="CODE">
                <button class="nav-btn" onclick="checkCheat()" style="font-size:10px;">DECRYPT</button>
            </div>
            <button class="play-btn" onclick="toggleCustom(false)" style="padding:10px 30px;">SAVE</button>
        </div>

        <div id="ui">
            <div id="lvlDisplay">LVL</div>
            <div id="pctDisplay">0%</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

            let found = allColors.find(c => c.hex === shopItem.hex);

                allColors.push({hex: shopItem.hex, req: null});
            } else {
                found.req = null;
            }
        } else if (shopItem.type === 'bg') {
            const bgMap = {
                'Peaks': 'mountains', 'Binary': 'matrix', 'Outrun': 'sunset', 'Nebula': 'nebula',
                'Inverse': 'inversion', 'Zenith': 'zenith', 'Chaos': 'chaos',
                'Speed Blur': 'speed', 'Aurora': 'aurora', 'Stars': 'stars',
                'Deep Void': 'void2', 'Static': 'static', 'Vortex': 'vortex',
                'Neon Flow': 'neon', 'Quantum': 'quantum'

            const bgId = bgMap[shopItem.name];
            let found = allBGs.find(b => b.id === bgId);
            if (!found) {
                allBGs.push({id: bgId, name: shopItem.name, req: null});
            } else {
                found.req = null;

            } else {
                found.req = null;

});

document.getElementById('start-trigger').addEventListener('click', startGame);

function checkCheat() {
    if(document.getElementById('cheat-input').value.toLowerCase() === 'sonico') {
        progress.beaten = levels.map(l => l.name);
        saveProgress(); refreshCustomUI();
        document.getElementById('cheat-input').value = "UNLOCKED";
    }
}

function saveProgress() { localStorage.setItem('neonPulseMastery', JSON.stringify(progress)); }

let customCategoryIdx = 0;
const customCategories = ['COLORS', 'BACKGROUNDS', 'TRAILS', 'SHOP'];

function changeCustomCategory(d) { 
    customCategoryIdx = (customCategoryIdx + d + customCategories.length) % customCategories.length; 
    refreshCustomUI();
}

function refreshCustomUI() {
    const catName = document.getElementById('custom-category-name');
    const grid = document.getElementById('customGrid');
    const pointsDisplay = document.getElementById('points-display');
    grid.innerHTML = '';
    pointsDisplay.innerText = progress.points;
    
    let items = [];
    let activeVal = '';
    let onSelect = null;
    
    if(customCategoryIdx === 0) {
        catName.innerText = 'COLORS';
        items = allColors;
        activeVal = playerColor;
        onSelect = (c) => { playerColor = c.hex; progress.selectedColor = c.hex; saveProgress(); };
    } else if(customCategoryIdx === 1) {
        catName.innerText = 'BACKGROUNDS';
        items = allBGs;
        activeVal = bgType;
        onSelect = (b) => { bgType = b.id; progress.selectedBG = b.id; saveProgress(); };
    } else if(customCategoryIdx === 2) {
        catName.innerText = 'TRAILS';
        items = allTrails;
        activeVal = playerTrail;
        onSelect = (t) => { playerTrail = t.id; progress.selectedTrail = t.id; saveProgress(); };
    } else {
        catName.innerText = 'SHOP - POINTS';
        items = shopItems;
    }
    
    if(customCategoryIdx < 3) {
        // Normal customization categories
        items.forEach(item => {
            const div = document.createElement('div');
            // Item is locked if it has a req and that req is not beaten, and it's not purchased
            const locked = item.req && !progress.beaten.includes(item.req) && (!progress.purchased || !progress.purchased.includes(item.id));
            
            if(customCategoryIdx === 0) {
                div.className = 'color-opt' + (locked ? ' locked' : '') + (item.hex === activeVal ? ' active' : '');
                div.style.background = item.hex;
                if (!locked) div.onclick = () => { onSelect(item); refreshCustomUI(); };
            } else if(customCategoryIdx === 1) {
                div.className = 'bg-opt' + (locked ? ' locked' : '') + (item.id === activeVal ? ' active' : '');
                div.innerText = locked ? 'LOCKED' : item.name;
                if (!locked) div.onclick = () => { onSelect(item); refreshCustomUI(); };
            } else {
                div.className = 'trail-opt' + (locked ? ' locked' : '') + (item.id === activeVal ? ' active' : '');
                div.innerText = locked ? 'L' : item.name;
                if (!locked) div.onclick = () => { onSelect(item); refreshCustomUI(); };
            }
            grid.appendChild(div);
        });
    } else {
        // Shop display
        items.forEach(item => {
            const div = document.createElement('div');
            const alreadyOwned = progress.purchased && progress.purchased.includes(item.id);
            const canAfford = progress.points >= item.cost;
            
            div.style.cssText = 'border: 1px solid #444; padding: 8px; border-radius: 4px; text-align: center; font-size: 10px; background: #111; cursor: ' + (alreadyOwned ? 'default' : 'pointer') + '; opacity: ' + (alreadyOwned ? '0.5' : '1') + ';';
            
            if(item.type === 'color') {
                div.innerHTML = '<div style="width:20px; height:20px; background:' + item.hex + '; border-radius:50%; margin:0 auto 5px;"></div>' + item.name + '<br/>' + (alreadyOwned ? 'OWNED' : (item.cost + ' pts'));
                if (!alreadyOwned && canAfford) {
                    div.onclick = () => { purchaseItem(item); };
                    div.style.borderColor = '#00d2ff';
                } else if (!alreadyOwned) {
                    div.style.opacity = '0.3';
                }
            } else {
                div.innerText = item.name + '\n' + (alreadyOwned ? 'OWNED' : (item.cost + ' pts'));
                if (!alreadyOwned && canAfford) {
                    div.onclick = () => { purchaseItem(item); };
                    div.style.borderColor = '#00d2ff';
                } else if (!alreadyOwned) {
                    div.style.opacity = '0.3';
                }
            }
            grid.appendChild(div);
        });
    }
}

function purchaseItem(item) {
    if (!progress.purchased) progress.purchased = [];
    if (progress.points >= item.cost) {
        progress.points -= item.cost;
        progress.purchased.push(item.id);
        
        // Add item to customization arrays and make it available
        if (item.type === 'color') {
            // Check if this color already exists in allColors
            let found = allColors.find(c => c.hex === item.hex);
            if (!found) {
                allColors.push({hex: item.hex, req: null});
            } else {
                found.req = null; // Make available
            }
            playerColor = item.hex;
            progress.selectedColor = item.hex;
        } else if (item.type === 'bg') {
            // Map shop bg names to actual bg ids
            const bgMap = {
                'Peaks': 'mountains', 'Binary': 'matrix', 'Outrun': 'sunset', 'Nebula': 'nebula',
                'Inverse': 'inversion', 'Zenith': 'zenith', 'Chaos': 'chaos',
                'Speed Blur': 'speed', 'Aurora': 'aurora', 'Stars': 'stars',
                'Deep Void': 'void2', 'Static': 'static', 'Vortex': 'vortex',
                'Neon Flow': 'neon', 'Quantum': 'quantum'
            };
            const bgId = bgMap[item.name];
            let found = allBGs.find(b => b.id === bgId);
            if (!found) {
                allBGs.push({id: bgId, name: item.name, req: null});
            } else {
                found.req = null;
            }
            bgType = bgId;
            progress.selectedBG = bgId;
        } else if (item.type === 'trail') {
            // Map shop trail names to actual trail ids
            const trailMap = {
                'Glow': 'trail3', 'Streak': 'trail4', 'Flare': 'trail7',
                'Echo': 'trail9', 'Vapor': 'trail11', 'Quantum': 'trail12',
                'Burst': 'trail5', 'Wave': 'trail6', 'Twist': 'trail8',
                'Phantom': 'trail10', 'Lightning': 'trail16', 'Whisper': 'trail17',
                'Void': 'trail18'
            };
            const trailId = trailMap[item.name];
            let found = allTrails.find(t => t.id === trailId);
            if (!found) {
                allTrails.push({id: trailId, name: item.name, req: null});
            } else {
                found.req = null;
            }
            playerTrail = trailId;
            progress.selectedTrail = trailId;
        }
        saveProgress();
        refreshCustomUI();
    }
}

// Quality multiplier for particle spawning
const qualityMultiplier = { low: 0.4, medium: 0.7, high: 1.0 };

// helper that creates trail particles depending on the currently selected trail style
function spawnTrail() {
    const config = trailConfigs[playerTrail];
    if (!config) return;
    
    const qm = qualityMultiplier[settings.particleQuality] || 1.0;
    if (Math.random() > config.chance * qm) return;
    
    const color = typeof config.c === 'function' ? config.c() : config.c;
    const vy = typeof config.vy === 'function' ? config.vy() : config.vy;
    
    particles.push({
        x: player.x,
        y: player.y + 15,
        vx: config.vx,
        vy: vy,
        l: config.l,
        c: color,
        size: config.size
    });
}

function buildLevel(idx) {
    objects = []; 
    let x = 1200; 
    const levelName = levels[idx].name;
    mode = levels[idx].start;

    if (levelName === 'The Gauntlet') {
        // Tutorial: Simple platform jumps
        for (let i = 0; i < 5; i++) {
            objects.push({x: x, y: 370, w: 70, h: 80, type: 's'});
            x += 350;
        }
    }
    else if (levelName === 'Velocity') {
        // Speed challenge: Medium platforms, closer together
        for (let i = 0; i < 8; i++) {
            objects.push({x: x, y: 360, w: 80, h: 90, type: 's'});
            x += 270;
        }
    }
    else if (levelName === 'Skyway') {
        // Flappy: Gentle vertical gates with wide gaps
        mode = 'flappy';
        for (let i = 0; i < 8; i++) {
            let gatePos = 120 + Math.sin(i * 0.5) * 80;
            gatePos = Math.max(60, Math.min(300, gatePos));
            let gateGap = 140;
            
            objects.push({x: x, y: 0, w: 60, h: gatePos, type: 's'});
            objects.push({x: x, y: gatePos + gateGap, w: 60, h: 450, type: 's'});
            x += 320;
        }
    }
    else if (levelName === 'The Abyss') {
        // Wave: Generous gaps to navigate through
        mode = 'wave';
        for (let i = 0; i < 7; i++) {
            let centerY = 180 + Math.sin(i * 0.4) * 80;
            let gapSize = 130;
            
            objects.push({x: x, y: 0, w: 400, h: centerY - gapSize/2, type: 's'});
            objects.push({x: x, y: centerY + gapSize/2, w: 400, h: 450, type: 's'});
            x += 320;
        }
    }
    else if (levelName === 'Inversion') {
        // Cube: Alternating high/low platforms
        mode = 'cube';

    else if (levelName === 'Flux') {

function drawBackground() {
    ctx.lineWidth = 1;
    if (bgType === 'city') {
        ctx.strokeStyle = '#1a1a1a';
        let s = (frame * 0.2) % 400;
        for (let i=-1; i<3; i++) { let bx = i*400-s; ctx.strokeRect(bx+20,250,60,200); ctx.strokeRect(bx+120,180,70,270); }
    } else if (bgType === 'mountains') {
        ctx.strokeStyle = '#222'; ctx.beginPath();
        let s = (frame * 0.1) % 800;
        for (let i=-1; i<2; i++) { let bx = i*800-s; ctx.moveTo(bx,430); ctx.lineTo(bx+200,150); ctx.lineTo(bx+400,320); ctx.lineTo(bx+600,80); ctx.lineTo(bx+800,430); }
        ctx.stroke();
    } else if (bgType === 'matrix') {
        ctx.strokeStyle = '#002200';
        for(let i=0; i<20; i++) { let x = (i*50 - frame*0.8)%850; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,450); ctx.stroke(); }
    } else if (bgType === 'sunset') {
        ctx.strokeStyle = '#331100';
        for(let i=0; i<8; i++) { ctx.beginPath(); ctx.arc(400, 430, 60 + i*45, Math.PI, 0); ctx.stroke(); }
    } else if (bgType === 'nebula') {
        ctx.fillStyle = '#0a001a'; ctx.fillRect(0,0,800,450);
        for(let i=0; i<25; i++) { 
            let x = (i*137 + frame*0.05)%800; let y = (i*97)%450;
            ctx.fillStyle = i%2===0 ? '#4400ff22' : '#ff00ff11';
            ctx.beginPath(); ctx.arc(x, y, 20 + (i%10), 0, Math.PI*2); ctx.fill();
        }
    } else if (bgType === 'retro') {
        ctx.fillStyle = '#080808'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#00ff00';
        for(let i=0;i<25;i++){ctx.beginPath();ctx.moveTo(0,450-i*18);ctx.lineTo(800,450-i*18);ctx.stroke();}
    } else if (bgType === 'din') {
        ctx.fillStyle = '#050005'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#550055';
        for(let i=0;i<20;i++){let x=(i*40+frame*0.5)%800;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,450);ctx.stroke();}
    } else if (bgType === 'horizon') {
        ctx.fillStyle = '#000010'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#3333ff';
        ctx.beginPath();ctx.moveTo(0,300);ctx.lineTo(800,300);ctx.stroke();
    } else if (bgType === 'speed') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#111';
        for(let i=0;i<50;i++){let x=(i*16 - frame*2)%800;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,450);ctx.stroke();}
    } else if (bgType === 'clouds') {
        ctx.fillStyle = '#001'; ctx.fillRect(0,0,800,450);
        ctx.fillStyle = '#333';
        for(let i=0;i<5;i++){ctx.beginPath();ctx.arc((i*200+frame*0.2)%800,100,60,0,Math.PI*2);ctx.fill();}
    } else if (bgType === 'caves') {
        ctx.fillStyle = '#020002'; ctx.fillRect(0,0,800,450);
        ctx.fillStyle = '#221122';
        for(let i=0;i<30;i++){ctx.fillRect(i*30,350,20,100);}
    } else if (bgType === 'inversion') {
        ctx.fillStyle = '#101010'; ctx.fillRect(0,0,800,450);
        ctx.globalCompositeOperation='difference'; ctx.fillStyle='#fff'; ctx.fillRect(0,200,800,50); ctx.globalCompositeOperation='source-over';
    } else if (bgType === 'chaos') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        for(let i=0;i<100;i++){ctx.strokeStyle = `hsl(${(frame+i*3)%360},50%,50%)`;ctx.beginPath();ctx.moveTo(Math.random()*800,Math.random()*450);ctx.lineTo(Math.random()*800,Math.random()*450);ctx.stroke();}
    } else if (bgType === 'zenith') {
        ctx.fillStyle = '#001020'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#00ffff';
        ctx.beginPath();ctx.moveTo(400,0);ctx.lineTo(400,450);ctx.stroke();
    } else if (bgType === 'cosmic') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        for(let i=0;i<50;i++){ctx.fillStyle='#'+Math.floor(Math.random()*16777215).toString(16);ctx.beginPath();ctx.arc(Math.random()*800,Math.random()*450,2,0,Math.PI*2);ctx.fill();}
    } else if (bgType === 'particles') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        ctx.fillStyle = '#00d2ff';
        for(let i=0;i<80;i++){let x=(i*50 - frame*0.3)%800;let y=(i*37)%450;ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();}
    } else if (bgType === 'scanlines') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        for(let i=0;i<450;i+=3){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(800,i);ctx.stroke();}
    } else if (bgType === 'grid3d') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#0080ff';
        let offset = (frame * 0.5) % 100;
        for(let i=0;i<10;i++){ctx.beginPath();ctx.moveTo(0,(i*50+offset)%450);ctx.lineTo(800,(i*50+offset)%450);ctx.stroke();}
        for(let i=0;i<9;i++){ctx.beginPath();ctx.moveTo(i*100,0);ctx.lineTo(i*100,450);ctx.stroke();}
    } else if (bgType === 'waves') {
        ctx.fillStyle = '#001144'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#00ffaa';
        for(let w=0;w<3;w++){ctx.beginPath();for(let x=0;x<800;x+=10){ctx.lineTo(x,220+Math.sin(x*0.01+frame*0.05+w)*40);}ctx.stroke();}
    } else if (bgType === 'neon') {
        ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#ff00ff';
        ctx.lineWidth = 2;
        for(let i=0;i<8;i++){ctx.beginPath();ctx.arc(400,225,(i+1)*40+Math.sin(frame*0.02)*20,0,Math.PI*2);ctx.stroke();}
    } else if (bgType === 'digital') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        ctx.fillStyle = '#00ff00';
        for(let i=0;i<100;i++){let x=Math.random()*800;let y=(i*10-frame*0.8)%450;ctx.fillText(Math.floor(Math.random()*2),x,y);}
    } else if (bgType === 'aurora') {
        ctx.fillStyle = '#001010'; ctx.fillRect(0,0,800,450);
        for(let i=0;i<5;i++){ctx.fillStyle=`rgba(0,255,${150+i*20},${0.1-i*0.02})`;ctx.beginPath();ctx.arc(400,225,100+i*80+Math.sin(frame*0.01)*30,0,Math.PI*2);ctx.fill();}
    } else if (bgType === 'stars') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        ctx.fillStyle = '#fff';
        for(let i=0;i<100;i++){let x=(i*71)%800;let y=(i*83)%450;let size=1+Math.sin(frame*0.01+i)*0.5;ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill();}
    } else if (bgType === 'void2') {
        ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0,0,800,450);
        for(let i=0;i<20;i++){ctx.fillStyle=`rgba(100,0,150,${0.2-i*0.01})`;ctx.beginPath();ctx.arc(400,225,300-i*15+Math.sin(frame*0.01)*20,0,Math.PI*2);ctx.fill();}
    } else if (bgType === 'static') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        for(let i=0;i<800*450*0.001;i++){ctx.fillStyle=Math.random()>0.5?'#111':'#222';ctx.fillRect(Math.random()*800,Math.random()*450,2,2);}
    } else if (bgType === 'vortex') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#ff00ff';
        for(let i=0;i<20;i++){let r=10+i*15+Math.sin(frame*0.02)*10;ctx.beginPath();ctx.arc(400,225,r,0,Math.PI*2);ctx.stroke();}
    } else if (bgType === 'quantum') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        for(let i=0;i<50;i++){let x=(i*100+frame*0.5)%800;let y=Math.sin(i)*200+225;ctx.fillStyle=`hsla(${(i*7+frame*2)%360},100%,50%,0.3)`;ctx.fillRect(x,y,20,20);}
    }
}

function update() {
    if (state === 'PLAYING') {
        // normal scroll speed (no multiplier) for a calmer pace
        let moveSpeed = currentSpeed || levels[lvlIdx].speed;
        
        // Accelerate mode: gradually increase speed
        if (mode === 'accelerate') {
            moveSpeed = baseSpeed + (frame / 4000) * baseSpeed;
        }
        
        frame += moveSpeed;
        
        // scale vertical movement moderately with current speed
        const speedFactor = moveSpeed / 12;
        
        if (mode === 'wave') {
            player.dy = spaceHeld ? -8 * gravity * speedFactor : 8 * gravity * speedFactor;
        }
        else if (mode === 'flappy') {
            player.dy += 0.8 * gravity * speedFactor;
        }
        else if (mode === 'doublejump') {
            player.dy += 1.2 * gravity;
        }
        else if (mode === 'walljump') {
            if (wallTouchTime > 0) {
                player.dy = spaceHeld ? -6 * gravity : 0;
                wallTouchTime--;
            } else {
                player.dy += 1.0 * gravity;
            }
        }
        else if (mode === 'dash') {
            player.dy += 1.0 * gravity;
        }
        else if (mode === 'shield') {
            player.dy += 1.0 * gravity;
        }
        else {
            player.dy += 1.0 * gravity * speedFactor;
        }

        if (player.grounded) {
            coyoteTime = 6;
            jumpsRemaining = mode === 'doublejump' ? 2 : 1;
        } else {
            coyoteTime--;
        }
        
        if (jumpBuffered && coyoteTime > 0) {
            if (mode === 'doublejump' && jumpsRemaining > 0) {
                player.dy = -14 * gravity;
                jumpsRemaining--;
                player.grounded = false;
                jumpBuffered = false;
            } else if (mode !== 'doublejump' && (mode === 'cube' || mode === 'dash' || mode === 'shield' || mode === 'accelerate')) {
                player.dy = -14.5 * gravity;
                player.grounded = false;
                jumpBuffered = false;
            }
        }
        
        player.y += player.dy;

        if (player.y + player.h >= 430) { 
            player.y = 430 - player.h; 
            player.dy = 0; 
            if(gravity === 1) player.grounded = true; 
        }
        if (player.y <= 20) { 
            player.y = 20; 
            player.dy = 0; 
            if(gravity === -1) player.grounded = true; 
        }

        objects.forEach(o => {
            let ox = o.x - frame + player.x;
            if (player.x < ox + o.w && player.x + player.w > ox && player.y < o.y + o.h && player.y + player.h > o.y) {
                if (o.type === 's') {
                    if (mode === 'walljump') {
                        wallTouchTime = 8;
                    } else if (mode === 'shield' && shieldHits < 1) {
                        shieldHits++;
                    } else {
                        die();
                    }
                }
                if (o.type === 'jumppad') {
                    player.dy = -20 * gravity;
                    o.hit = true;
                }
                if (o.type === 'portal') { 
                    mode = o.to; 
                    player.dy = 0; 
                    currentSpeed = levels[lvlIdx].speed;
                    shieldHits = 0;
                    baseSpeed = currentSpeed;
                }
                if (o.type === 'grav' && !o.hit) {
                    gravity *= -1; 
                    o.hit = true; 
                    player.dy = 0;
                    player.y = 450 - player.y - player.h;
                    objects.forEach(ob => {
                        if (ob.type === 's') {
                            ob.y = 450 - ob.y - ob.h;
                        }
                    });
                }
                if (o.type === 'speed2') {
                    currentSpeed = levels[lvlIdx].speed * 2;
                    o.hit = true;
                }
                if (o.type === 'speed4') {
                    currentSpeed = levels[lvlIdx].speed * 4;
                    o.hit = true;
                }
            }
        });

        if (player.y < -50 || player.y > 500) die();
        spawnTrail();

        let pct = Math.min(100, Math.floor(frame/200));
        document.getElementById('pctDisplay').innerText = pct + "%";
        if (pct >= 100) win();
    }
    draw();
    requestAnimationFrame(update);
}

function die() {
    state = 'DEAD';
    setTimeout(() => { state = 'MENU'; document.getElementById('menu').classList.remove('hidden'); document.getElementById('ui').style.display = 'none'; }, 800);
}

function makeItemAvailable(itemId) {
    // Add shop item to purchased list and customization options
    if (!progress.purchased) progress.purchased = [];
    if (!progress.purchased.includes(itemId)) {
        progress.purchased.push(itemId);
        
        const shopItem = shopItems.find(s => s.id === itemId);
        if (shopItem) {
            if (shopItem.type === 'color') {
                let found = allColors.find(c => c.hex === shopItem.hex);
                if (!found) {
                    allColors.push({hex: shopItem.hex, req: null});
                } else {
                    found.req = null;
                }
            } else if (shopItem.type === 'bg') {
                const bgMap = {
                    'Peaks': 'mountains', 'Binary': 'matrix', 'Outrun': 'sunset', 'Nebula': 'nebula',
                    'Inverse': 'inversion', 'Zenith': 'zenith', 'Chaos': 'chaos',
                    'Speed Blur': 'speed', 'Aurora': 'aurora', 'Stars': 'stars',
                    'Deep Void': 'void2', 'Static': 'static', 'Vortex': 'vortex',
                    'Neon Flow': 'neon', 'Quantum': 'quantum'
                };
                const bgId = bgMap[shopItem.name];
                let found = allBGs.find(b => b.id === bgId);
                if (!found) {
                    allBGs.push({id: bgId, name: shopItem.name, req: null});
                } else {
                    found.req = null;
                }
            } else if (shopItem.type === 'trail') {
                const trailMap = {
                    'Glow': 'trail3', 'Streak': 'trail4', 'Flare': 'trail7',
                    'Echo': 'trail9', 'Vapor': 'trail11', 'Quantum': 'trail12',
                    'Burst': 'trail5', 'Wave': 'trail6', 'Twist': 'trail8',
                    'Phantom': 'trail10', 'Lightning': 'trail16', 'Whisper': 'trail17',
                    'Void': 'trail18'
                };
                const trailId = trailMap[shopItem.name];
                let found = allTrails.find(t => t.id === trailId);
                if (!found) {
                    allTrails.push({id: trailId, name: shopItem.name, req: null});
                } else {
                    found.req = null;
                }
            }
        }
    }
}

function win() {
    // Calculate completion percentage (frame/2 because levels end at 200 frames for 100%)
    let completionPct = Math.min(100, Math.floor(frame/200));
    
    // Award points based on completion percentage
    let pointsEarned = Math.max(50, Math.floor(completionPct * 1.5)); // Minimum 50, scales with % completion
    progress.points += pointsEarned;
    
    // Mark level as beaten and unlock rewards
    if(!progress.beaten.includes(levels[lvlIdx].name)) { 
        progress.beaten.push(levels[lvlIdx].name);
        
        // Unlock rewards for this level
        if(levels[lvlIdx].unlocks) {
            levels[lvlIdx].unlocks.forEach(unlockId => {
                makeItemAvailable(unlockId);
            });
        }
    }
    
    saveProgress();
    state = 'MENU'; 
    document.getElementById('menu').classList.remove('hidden'); 
    document.getElementById('ui').style.display = 'none';
    alert("LEVEL CLEAR!\n+" + pointsEarned + " POINTS");
}

function draw() {
    ctx.clearRect(0,0,800,450);
    if (settings.bgEnabled) drawBackground();
    ctx.fillStyle = '#151515'; ctx.fillRect(0, 430, 800, 20); ctx.fillRect(0, 0, 800, 20);
    objects.forEach(o => {
        let ox = o.x - frame + player.x;
        if(o.type === 'portal') { ctx.fillStyle = 'rgba(0,210,255,0.1)'; ctx.fillRect(ox, 0, o.w, 450); }
        else if(o.type === 'grav') { ctx.fillStyle = 'rgba(255,255,0,0.2)'; ctx.fillRect(ox, 0, o.w, 450); }
        else if(o.type === 'speed2') { ctx.fillStyle = 'rgba(0,255,0,0.3)'; ctx.fillRect(ox, 0, o.w, 450); }
        else if(o.type === 'speed4') { ctx.fillStyle = 'rgba(255,0,0,0.3)'; ctx.fillRect(ox, 0, o.w, 450); }
        else if(o.type === 'jumppad') { ctx.fillStyle = '#00ff00'; ctx.fillRect(ox, o.y, o.w, o.h); ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 2; ctx.strokeRect(ox, o.y, o.w, o.h); }
        else { ctx.fillStyle = o.type==='s' ? '#ff3333' : '#ffffff'; ctx.fillRect(ox, o.y, o.w, o.h); }
    });
    if(state === 'PLAYING') {
        ctx.fillStyle = playerColor;
        if (settings.shadowEnabled) { ctx.shadowBlur = 15; ctx.shadowColor = playerColor; }
        
        // Draw shield indicator if shield mode
        if (mode === 'shield' && shieldHits < 1) {
            ctx.strokeStyle = playerColor;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(player.x + 15, player.y + 15, 20, 0, Math.PI * 2);
            ctx.stroke();
        }
        
        if(mode === 'cube' || mode === 'dash' || mode === 'shield' || mode === 'accelerate') {
            ctx.fillRect(player.x, player.y, player.w, player.h);
        }
        else if(mode === 'doublejump') {
            // Double jump: star shape
            ctx.beginPath();
            ctx.moveTo(player.x + 15, player.y);
            ctx.lineTo(player.x + 20, player.y + 12);
            ctx.lineTo(player.x + 30, player.y + 12);
            ctx.lineTo(player.x + 22, player.y + 18);
            ctx.lineTo(player.x + 25, player.y + 30);
            ctx.lineTo(player.x + 15, player.y + 24);
            ctx.lineTo(player.x + 5, player.y + 30);
            ctx.lineTo(player.x + 8, player.y + 18);
            ctx.lineTo(player.x + 0, player.y + 12);
            ctx.lineTo(player.x + 10, player.y + 12);
            ctx.fill();
        }
        else if(mode === 'walljump') {
            // Wall jump: triangle
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(player.x + 30, player.y + 15);
            ctx.lineTo(player.x, player.y + 30);
            ctx.fill();
        }
        else if(mode === 'flappy') { 
            ctx.beginPath(); 
            ctx.arc(player.x+15, player.y+15, 14, 0, Math.PI*2); 
            ctx.fill(); 
        }
        else if(mode === 'wave') { 
            ctx.beginPath();
            if(gravity === 1) { ctx.moveTo(player.x, player.y+30); ctx.lineTo(player.x+30, player.y+15); ctx.lineTo(player.x, player.y); }
            else { ctx.moveTo(player.x, player.y); ctx.lineTo(player.x+30, player.y+15); ctx.lineTo(player.x, player.y+30); }
            ctx.fill();
        }
        ctx.shadowBlur = 0;
    }
    particles.forEach((p, i) => {
        ctx.globalAlpha = p.l; ctx.fillStyle = p.c;
        let sz = p.size || 4;
        ctx.fillRect(p.x+=p.vx, p.y+=p.vy, sz, sz);
        p.l -= 0.02; if(p.l <= 0) particles.splice(i, 1);
    });
    ctx.globalAlpha = 1;
}

function changeLevel(d) { lvlIdx = (lvlIdx + d + levels.length) % levels.length; document.getElementById('level-name').innerText = levels[lvlIdx].name; }

window.onkeydown = (e) => { 
    if(e.code === 'Space') { 
        e.preventDefault(); spaceHeld = true; jumpBuffered = true; 
        if(state === 'PLAYING' && mode === 'flappy') player.dy = -8 * gravity;
    } 
};
window.onkeyup = (e) => { if(e.code === 'Space') { spaceHeld = false; jumpBuffered = false; } };

// Mobile touch support
document.addEventListener('touchstart', (e) => {
    if(state === 'PLAYING') {
        e.preventDefault();
        spaceHeld = true;
        jumpBuffered = true;
        if(mode === 'flappy') player.dy = -8 * gravity;
    }
}, { passive: false });

document.addEventListener('touchend', (e) => {
    if(state === 'PLAYING') {
        e.preventDefault();
        spaceHeld = false;
        jumpBuffered = false;
    }
}, { passive: false });

updateSettingsUI();
update();
</script>
