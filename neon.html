<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dad Pulse: Unique DNA</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #game-wrapper { position: relative; width: 800px; height: 450px; }
        canvas { background: #0a0a0a; border: 2px solid #333; border-radius: 10px; display: block; }
        #menu, #custom-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(5, 5, 5, 0.98); z-index: 5000; }
        .nav-btn { background: #222; border: 1px solid #00d2ff; color: #00d2ff; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .play-btn { background: #00d2ff; color: #000; border: none; padding: 15px 50px; font-weight: bold; cursor: pointer; border-radius: 4px; margin: 15px; font-size: 18px; z-index: 6000; }
        .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 10px 0; }
        .color-opt { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .locked { filter: grayscale(1) brightness(0.2); cursor: not-allowed !important; }
        .color-opt.active { border-color: white; box-shadow: 0 0 10px white; transform: scale(1.1); }
        .bg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .bg-opt { padding: 6px 10px; border: 1px solid #444; cursor: pointer; border-radius: 4px; background: #111; font-size: 10px; text-align: center; }
        .bg-opt.active { border-color: #00d2ff; color: #00d2ff; box-shadow: 0 0 8px #00d2ff; }

        /* trail selection UI */
        .trail-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 10px 0; }
        .trail-opt { width: 40px; height: 40px; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; background: #222; border-radius: 4px; }
        .trail-opt.locked { filter: grayscale(1) brightness(0.2); cursor: not-allowed !important; }
        .trail-opt.active { border-color: #00d2ff; box-shadow: 0 0 10px #00d2ff; transform: scale(1.1); }

        #cheat-box { margin-top: 15px; display: flex; gap: 5px; }
        #cheat-input { background: #000; border: 1px solid #333; color: #00ffaa; padding: 5px; font-family: monospace; width: 100px; text-align: center; outline: none; }
        #ui { position: absolute; top: 20px; left: 20px; right: 20px; display: none; justify-content: space-between; font-size: 20px; pointer-events: none; z-index: 1000; font-family: monospace; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="menu">
            <h1 style="color: #00d2ff; letter-spacing: 8px; text-shadow: 0 0 15px #00d2ff;">NEON PULSE</h1>
            <div style="display:flex; align-items:center; gap:20px; margin-bottom:15px;">
                <button class="nav-btn" onclick="changeLevel(-1)">&#9664;</button>
                <div id="level-name" style="width:200px; text-align:center; font-size: 22px;">THE GAUNTLET</div>
                <button class="nav-btn" onclick="changeLevel(1)">&#9654;</button>
            </div>
            <button class="play-btn" id="start-trigger">START ENGINE</button>
            <button class="nav-btn" style="color:#888; border-color:#333;" onclick="toggleCustom(true)">COLLECTION</button>
        </div>

        <div id="custom-menu" class="hidden">
            <h2 style="font-size:18px; color:#00d2ff; margin:5px;">CUSTOMIZE DATA</h2>
            <div class="color-grid" id="colorGrid"></div>
            <div class="bg-grid" id="bgGrid"></div>
            <div style="font-size:14px; margin:5px; color:#00d2ff;">TRAIL</div>
            <div class="trail-grid" id="trailGrid"></div>
            <div id="cheat-box">
                <input type="text" id="cheat-input" placeholder="CODE">
                <button class="nav-btn" onclick="checkCheat()" style="font-size:10px;">DECRYPT</button>
            </div>
            <button class="play-btn" onclick="toggleCustom(false)" style="padding:10px 30px;">SAVE</button>
        </div>

        <div id="ui">
            <div id="lvlDisplay">LVL</div>
            <div id="pctDisplay">0%</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 450;

let state = 'MENU', frame = 0, objects = [], particles = [], lvlIdx = 0;
let spaceHeld = false, jumpBuffered = false, coyoteTime = 0;
let playerColor = '#00d2ff', bgType = 'void', mode = 'cube', gravity = 1;
let playerTrail = 'trail1';
let currentSpeed = 0; // will be initialized when level starts

let progress = JSON.parse(localStorage.getItem('neonPulseMastery')) || { beaten: [], selectedColor: '#00d2ff', selectedBG: 'void', selectedTrail: 'trail1' };
playerColor = progress.selectedColor; bgType = progress.selectedBG;
playerTrail = progress.selectedTrail || playerTrail;

const allColors = [
    // free colors
    {hex: '#00d2ff', req: null}, {hex: '#ff00ff', req: null}, {hex: '#00ffaa', req: null}, {hex: '#ffff00', req: null},
    {hex: '#00ff00', req: null}, {hex: '#ff0080', req: null}, {hex: '#00ffe0', req: null}, {hex: '#ffa500', req: null},
    // The Gauntlet rewards
    {hex: '#ff4b2b', req: 'The Gauntlet'}, {hex: '#a020f0', req: 'The Gauntlet'}, {hex: '#0080ff', req: 'The Gauntlet'},
    {hex: '#ffff80', req: 'The Gauntlet'},
    // Velocity rewards
    {hex: '#ff8c00', req: 'Velocity'}, {hex: '#ffffff', req: 'Velocity'}, {hex: '#00ffff', req: 'Velocity'},
    {hex: '#ff0000', req: 'Velocity'},
    // Skyway rewards
    {hex: '#adff2f', req: 'Skyway'}, {hex: '#ff0055', req: 'Skyway'}, {hex: '#8000ff', req: 'Skyway'},
    {hex: '#00ff80', req: 'Skyway'},
    // The Abyss rewards
    {hex: '#8c00ff', req: 'The Abyss'}, {hex: '#0055ff', req: 'The Abyss'},
    // later levels
    {hex: '#ffaa00', req: 'Inversion'}, {hex: '#00ffaa', req: 'Inversion'},
    {hex: '#ff00aa', req: 'Zenith'}, {hex: '#aa00ff', req: 'Zenith'}
];

const allBGs = [
    // free backgrounds
    {id: 'void', name: 'Void', req: null}, {id: 'city', name: 'City', req: null}, {id: 'retro', name: 'Retro Grid', req: null},
    {id: 'din', name: 'DIN Lines', req: null},
    // Gauntlet reward
    {id: 'mountains', name: 'Peaks', req: 'The Gauntlet'}, {id: 'horizon', name: 'Horizon', req: 'The Gauntlet'},
    // Velocity rewards
    {id: 'matrix', name: 'Binary', req: 'Velocity'}, {id: 'speed', name: 'Speed Blur', req: 'Velocity'},
    // Skyway rewards
    {id: 'sunset', name: 'Outrun', req: 'Skyway'}, {id: 'clouds', name: 'Clouds', req: 'Skyway'},
    // Abyss rewards
    {id: 'nebula', name: 'Nebula', req: 'The Abyss'}, {id: 'caves', name: 'Cavern', req: 'The Abyss'},
    // Later levels
    {id: 'inversion', name: 'Inverse', req: 'Inversion'}, {id: 'chaos', name: 'Chaos', req: 'Inversion'},
    {id: 'zenith', name: 'Zenith', req: 'Zenith'}, {id: 'cosmic', name: 'Cosmic', req: 'Zenith'}
];

// trail definitions (12 styles, some locked by level prize)
const allTrails = [
    {id: 'trail1', name: 'Basic', req: null},
    {id: 'trail2', name: 'Spark', req: null},
    {id: 'trail3', name: 'Glow', req: 'The Gauntlet'},
    {id: 'trail4', name: 'Streak', req: 'The Gauntlet'},
    {id: 'trail5', name: 'Burst', req: 'Velocity'},
    {id: 'trail6', name: 'Wave', req: 'Velocity'},
    {id: 'trail7', name: 'Flare', req: 'Skyway'},
    {id: 'trail8', name: 'Twist', req: 'Skyway'},
    {id: 'trail9', name: 'Echo', req: 'The Abyss'},
    {id: 'trail10', name: 'Phantom', req: 'The Abyss'},
    {id: 'trail11', name: 'Vapor', req: 'Inversion'},
    {id: 'trail12', name: 'Quantum', req: 'Zenith'}
];

const levels = [
    { name: "The Gauntlet", speed: 8, start: 'cube', theme: 'intro' },
    { name: "Velocity", speed: 10, start: 'cube', theme: 'speed' },
    { name: "Skyway", speed: 9, start: 'flappy', theme: 'aerial' },
    { name: "The Abyss", speed: 10, start: 'wave', theme: 'tight' },
    { name: "Inversion", speed: 9, start: 'cube', theme: 'flip' },
    { name: "Zenith", speed: 11, start: 'wave', theme: 'chaos' },
    { name: "Flux", speed: 10, start: 'cube', theme: 'switch' }
];

document.getElementById('start-trigger').addEventListener('click', startGame);

function checkCheat() {
    if(document.getElementById('cheat-input').value.toLowerCase() === 'sonico') {
        progress.beaten = levels.map(l => l.name);
        saveProgress(); refreshCustomUI();
        document.getElementById('cheat-input').value = "UNLOCKED";
    }
}

function saveProgress() { localStorage.setItem('neonPulseMastery', JSON.stringify(progress)); }

function refreshCustomUI() {
    const cGrid = document.getElementById('colorGrid'); cGrid.innerHTML = '';
    allColors.forEach(c => {
        const div = document.createElement('div');
        const locked = c.req && !progress.beaten.includes(c.req);
        div.className = 'color-opt' + (locked ? ' locked' : '') + (c.hex === playerColor ? ' active' : '');
        div.style.background = c.hex;
        if (!locked) div.onclick = () => { playerColor = c.hex; progress.selectedColor = c.hex; saveProgress(); refreshCustomUI(); };
        cGrid.appendChild(div);
    });

    const bGrid = document.getElementById('bgGrid'); bGrid.innerHTML = '';
    allBGs.forEach(b => {
        const div = document.createElement('div');
        const locked = b.req && !progress.beaten.includes(b.req);
        div.className = 'bg-opt' + (locked ? ' locked' : '') + (b.id === bgType ? ' active' : '');
        div.innerText = locked ? 'LOCKED' : b.name;
        if (!locked) div.onclick = () => { bgType = b.id; progress.selectedBG = b.id; saveProgress(); refreshCustomUI(); };
        bGrid.appendChild(div);
    });

    // trail options
    const tGrid = document.getElementById('trailGrid'); tGrid.innerHTML = '';
    allTrails.forEach(t => {
        const div = document.createElement('div');
        const locked = t.req && !progress.beaten.includes(t.req);
        div.className = 'trail-opt' + (locked ? ' locked' : '') + (t.id === playerTrail ? ' active' : '');
        div.innerText = t.name;
        if (!locked) div.onclick = () => { playerTrail = t.id; progress.selectedTrail = t.id; saveProgress(); refreshCustomUI(); };
        tGrid.appendChild(div);
    });
}

function toggleCustom(s) {
    if(s) refreshCustomUI();
    document.getElementById('custom-menu').classList.toggle('hidden', !s);
    document.getElementById('menu').classList.toggle('hidden', s);
}

function startGame() {
    buildLevel(lvlIdx);
    frame = 0; particles = []; gravity = 1; 
    mode = levels[lvlIdx].start;
    player.dy = 0; player.y = 225;
    currentSpeed = levels[lvlIdx].speed; // reset speed multiplier
    state = 'PLAYING';
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('ui').style.display = 'flex';
    document.getElementById('lvlDisplay').innerText = levels[lvlIdx].name;
}

const player = { x: 150, y: 225, w: 30, h: 30, dy: 0, grounded: false };

// helper that creates trail particles depending on the currently selected trail style
function spawnTrail() {
    switch(playerTrail) {
        case 'trail2':
            if(Math.random() > 0.3) particles.push({x:player.x, y:player.y+15, vx:-2, vy:(Math.random()-0.5)*2, l:1, c:'#ffffff', size:2});
            break;
        case 'trail3':
            if(Math.random() > 0.5) particles.push({x:player.x, y:player.y+15, vx:-1, vy:(Math.random()-0.5), l:1.2, c:playerColor, size:6});
            break;
        case 'trail4':
            if(Math.random() > 0.4) particles.push({x:player.x, y:player.y+15, vx:-3, vy:(Math.random()-0.5), l:0.6, c:'#ff0', size:5});
            break;
        case 'trail5':
            if(Math.random() > 0.35) particles.push({x:player.x, y:player.y+15, vx:-4, vy:(Math.random()-0.5), l:0.7, c:'#0f0', size:3});
            break;
        case 'trail6':
            if(Math.random() > 0.4) particles.push({x:player.x, y:player.y+15, vx:-3, vy:(Math.random()-0.3), l:0.9, c:'#f0f', size:4});
            break;
        case 'trail7':
            if(Math.random() > 0.45) particles.push({x:player.x, y:player.y+15, vx:-2, vy:(Math.random()-0.5), l:1, c:'#0ff', size:6});
            break;
        case 'trail8':
            if(Math.random() > 0.5) particles.push({x:player.x, y:player.y+15, vx:-2, vy:(Math.random()-0.2), l:0.8, c:'#ffa500', size:5});
            break;
        case 'trail9':
            if(Math.random() > 0.4) particles.push({x:player.x, y:player.y+15, vx:-3, vy:(Math.random()-0.5), l:0.7, c:'#888', size:4});
            break;
        case 'trail10':
            if(Math.random() > 0.35) particles.push({x:player.x, y:player.y+15, vx:-5, vy:(Math.random()-0.5), l:0.6, c:'#333', size:2});
            break;
        case 'trail11':
            if(Math.random() > 0.5) particles.push({x:player.x, y:player.y+15, vx:-3, vy:(Math.random()-0.7), l:1.1, c:'#00ffff', size:7});
            break;
        case 'trail12':
            if(Math.random() > 0.45) particles.push({x:player.x, y:player.y+15, vx:-4, vy:(Math.random()-0.5), l:0.8, c:'#ff69b4', size:4});
            break;
        default:
            if(Math.random() > 0.4) particles.push({x:player.x, y:player.y+15, vx:-3, vy:Math.random()-0.5, l:0.8, c:playerColor});
    }
}

function buildLevel(idx) {
    objects = []; 
    let x = 1200; 
    let curMode = levels[idx].start;
    const theme = levels[idx].theme;

    for(let i=0; i<120; i++) {
        // --- Portal Logic (randomized instead of fixed intervals) ---
        if ((theme === 'chaos' || theme === 'switch') && Math.random() < 0.08) {
            let next = ['cube', 'wave', 'flappy'][Math.floor(Math.random()*3)];
            objects.push({x: x, y: 0, w: 60, h: 450, type: 'portal', to: next});
            curMode = next; x += 300 + Math.random()*200;
        } else if (theme === 'switch' && Math.random() < 0.12) {
            let next = ['cube', 'wave', 'flappy'][Math.floor(Math.random()*3)];
            objects.push({x: x, y: 0, w: 60, h: 450, type: 'portal', to: next});
            curMode = next; x += 300 + Math.random()*200;
        }
        // occasional speed portals
        if (Math.random() < 0.02) {
            objects.push({x: x, y: 0, w: 60, h: 450, type: 'speed2'});
            x += 300 + Math.random()*200;
        } else if (Math.random() < 0.01) {
            objects.push({x: x, y: 0, w: 60, h: 450, type: 'speed4'});
            x += 300 + Math.random()*200;
        }

        // --- Gravity Flip Logic (random) ---
        if ((theme === 'flip' || theme === 'chaos' || theme === 'switch') && Math.random() < 0.06) {
            // make portal cover the full screen width for immediate contact
            objects.push({x: x, y: 0, w: 800, h: 450, type: 'grav'});
            x += 300 + Math.random()*200;
        }

        // --- Obstacle DNA with level variations ---
        let levelName = levels[idx].name;
        if (curMode === 'cube') {
            // base parameters
            let spacing = 600;
            let height = 35;
            let ypos = 395;
            if (theme === 'speed') {
                spacing = 350;
            }
            // level-specific tweaks and randomness
            if (levelName === 'The Gauntlet') {
                spacing += (Math.random() - 0.5) * 200; // random jitter
                height = 25 + Math.random() * 30;
            } else if (levelName === 'Velocity') {
                spacing = 300 + Math.random() * 200;
                height = 20 + Math.random() * 40;
            } else if (levelName === 'Inversion') {
                ypos = (Math.random() > 0.5) ? 395 : 20;
                spacing += (Math.random() - 0.5) * 100;
            } else {
                spacing += (Math.random() - 0.5) * 150;
                height = 20 + Math.random() * 50;
            }
            objects.push({x: x, y: ypos, w: 30, h: height, type: 's'});
            x += spacing;
        } 
        else if (curMode === 'wave') {
            let gap = (theme === 'tight' || theme === 'chaos') ? 120 : 170;
            let topH = 100 + Math.sin(i) * 50;
            if (levelName === 'The Abyss') {
                gap -= 20;
                topH += Math.cos(i*0.5) * 30;
            } else if (levelName === 'Zenith') {
                topH = 120 + Math.sin(i * 2) * 60;
                gap = 100 + Math.random() * 80;
            }
            // add randomness to gap
            gap += (Math.random() - 0.5) * 50;
            objects.push({x: x, y: 0, w: 400, h: topH, type: 's'});
            objects.push({x: x, y: topH + gap, w: 400, h: 450, type: 's'});
            x += 300 + Math.random() * 200;
        } 
        else if (curMode === 'flappy') {
            let gap = (theme === 'aerial') ? 140 : 180;
            if (levelName === 'Skyway') gap -= 30;
            if (levelName === 'Velocity') gap = 100 + Math.random() * 60;
            let pos = 50 + Math.random() * 200;
            if (levelName === 'Skyway' && Math.random() > 0.5) pos = 10 + Math.random() * 60;
            // jitter gap and pos
            gap += (Math.random() - 0.5) * 40;
            pos += (Math.random() - 0.5) * 50;
            objects.push({x: x, y: 0, w: 60, h: pos, type: 's'});
            objects.push({x: x, y: pos + gap, w: 60, h: 450, type: 's'});
            x += 400 + Math.random() * 200;
        }
    }
}

function drawBackground() {
    ctx.lineWidth = 1;
    if (bgType === 'city') {
        ctx.strokeStyle = '#1a1a1a';
        let s = (frame * 0.2) % 400;
        for (let i=-1; i<3; i++) { let bx = i*400-s; ctx.strokeRect(bx+20,250,60,200); ctx.strokeRect(bx+120,180,70,270); }
    } else if (bgType === 'mountains') {
        ctx.strokeStyle = '#222'; ctx.beginPath();
        let s = (frame * 0.1) % 800;
        for (let i=-1; i<2; i++) { let bx = i*800-s; ctx.moveTo(bx,430); ctx.lineTo(bx+200,150); ctx.lineTo(bx+400,320); ctx.lineTo(bx+600,80); ctx.lineTo(bx+800,430); }
        ctx.stroke();
    } else if (bgType === 'matrix') {
        ctx.strokeStyle = '#002200';
        for(let i=0; i<20; i++) { let x = (i*50 - frame*0.8)%850; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,450); ctx.stroke(); }
    } else if (bgType === 'sunset') {
        ctx.strokeStyle = '#331100';
        for(let i=0; i<8; i++) { ctx.beginPath(); ctx.arc(400, 430, 60 + i*45, Math.PI, 0); ctx.stroke(); }
    } else if (bgType === 'nebula') {
        ctx.fillStyle = '#0a001a'; ctx.fillRect(0,0,800,450);
        for(let i=0; i<25; i++) { 
            let x = (i*137 + frame*0.05)%800; let y = (i*97)%450;
            ctx.fillStyle = i%2===0 ? '#4400ff22' : '#ff00ff11';
            ctx.beginPath(); ctx.arc(x, y, 20 + (i%10), 0, Math.PI*2); ctx.fill();
        }
    } else if (bgType === 'retro') {
        ctx.fillStyle = '#080808'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#00ff00';
        for(let i=0;i<25;i++){ctx.beginPath();ctx.moveTo(0,450-i*18);ctx.lineTo(800,450-i*18);ctx.stroke();}
    } else if (bgType === 'din') {
        ctx.fillStyle = '#050005'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#550055';
        for(let i=0;i<20;i++){let x=(i*40+frame*0.5)%800;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,450);ctx.stroke();}
    } else if (bgType === 'horizon') {
        ctx.fillStyle = '#000010'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#3333ff';
        ctx.beginPath();ctx.moveTo(0,300);ctx.lineTo(800,300);ctx.stroke();
    } else if (bgType === 'speed') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#111';
        for(let i=0;i<50;i++){let x=(i*16 - frame*2)%800;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,450);ctx.stroke();}
    } else if (bgType === 'clouds') {
        ctx.fillStyle = '#001'; ctx.fillRect(0,0,800,450);
        ctx.fillStyle = '#333';
        for(let i=0;i<5;i++){ctx.beginPath();ctx.arc((i*200+frame*0.2)%800,100,60,0,Math.PI*2);ctx.fill();}
    } else if (bgType === 'caves') {
        ctx.fillStyle = '#020002'; ctx.fillRect(0,0,800,450);
        ctx.fillStyle = '#221122';
        for(let i=0;i<30;i++){ctx.fillRect(i*30,350,20,100);}
    } else if (bgType === 'inversion') {
        ctx.fillStyle = '#101010'; ctx.fillRect(0,0,800,450);
        ctx.globalCompositeOperation='difference'; ctx.fillStyle='#fff'; ctx.fillRect(0,200,800,50); ctx.globalCompositeOperation='source-over';
    } else if (bgType === 'chaos') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        for(let i=0;i<100;i++){ctx.strokeStyle = `hsl(${(frame+i*3)%360},50%,50%)`;ctx.beginPath();ctx.moveTo(Math.random()*800,Math.random()*450);ctx.lineTo(Math.random()*800,Math.random()*450);ctx.stroke();}
    } else if (bgType === 'zenith') {
        ctx.fillStyle = '#001020'; ctx.fillRect(0,0,800,450);
        ctx.strokeStyle = '#00ffff';
        ctx.beginPath();ctx.moveTo(400,0);ctx.lineTo(400,450);ctx.stroke();
    } else if (bgType === 'cosmic') {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,800,450);
        for(let i=0;i<50;i++){ctx.fillStyle='#'+Math.floor(Math.random()*16777215).toString(16);ctx.beginPath();ctx.arc(Math.random()*800,Math.random()*450,2,0,Math.PI*2);ctx.fill();}
    }
}

function update() {
    if (state === 'PLAYING') {
        // normal scroll speed (no multiplier) for a calmer pace
        const moveSpeed = currentSpeed || levels[lvlIdx].speed;
        frame += moveSpeed;
        
        // scale vertical movement moderately with current speed
        const speedFactor = (currentSpeed || levels[lvlIdx].speed) / 12;
        if (mode === 'wave') player.dy = spaceHeld ? -8 * gravity * speedFactor : 8 * gravity * speedFactor;
        else if (mode === 'flappy') player.dy += 0.8 * gravity * speedFactor; // faster fall/ascend
        else player.dy += 1.0 * gravity * speedFactor;

        if (player.grounded) coyoteTime = 6; else coyoteTime--;
        if (jumpBuffered && coyoteTime > 0 && mode === 'cube') { player.dy = -14.5 * gravity; player.grounded = false; jumpBuffered = false; }
        
        player.y += player.dy;

        if (player.y + player.h >= 430) { player.y = 430 - player.h; player.dy = 0; if(gravity === 1) player.grounded = true; }
        if (player.y <= 20) { player.y = 20; player.dy = 0; if(gravity === -1) player.grounded = true; }

        objects.forEach(o => {
            let ox = o.x - frame + player.x;
            if (player.x < ox + o.w && player.x + player.w > ox && player.y < o.y + o.h && player.y + player.h > o.y) {
                if (o.type === 's') die();
                if (o.type === 'portal') { mode = o.to; player.dy = 0; currentSpeed = levels[lvlIdx].speed; }
                if (o.type === 'grav' && !o.hit) {
                    gravity *= -1; o.hit = true; player.dy = 0;
                    // immediately teleport player to opposite side
                    player.y = 450 - player.y - player.h;
                    // flip all solid obstacles to the side the player currently occupies
                    objects.forEach(ob => {
                        if (ob.type === 's') {
                            ob.y = 450 - ob.y - ob.h;
                        }
                    });
                }
                if (o.type === 'speed2') {
                    currentSpeed = levels[lvlIdx].speed * 2;
                    o.hit = true;
                }
                if (o.type === 'speed4') {
                    currentSpeed = levels[lvlIdx].speed * 4;
                    o.hit = true;
                }
            }
        });

        if (player.y < -50 || player.y > 500) die();
        // spawn trail particles based on selected style
        spawnTrail();

        let pct = Math.min(100, Math.floor(frame/400));
        document.getElementById('pctDisplay').innerText = pct + "%";
        if (pct >= 100) win();
    }
    draw();
    requestAnimationFrame(update);
}

function die() {
    state = 'DEAD';
    setTimeout(() => { state = 'MENU'; document.getElementById('menu').classList.remove('hidden'); document.getElementById('ui').style.display = 'none'; }, 800);
}

function win() {
    if(!progress.beaten.includes(levels[lvlIdx].name)) { progress.beaten.push(levels[lvlIdx].name); saveProgress(); }
    state = 'MENU'; document.getElementById('menu').classList.remove('hidden'); document.getElementById('ui').style.display = 'none';
    alert("LEVEL CLEAR!");
}

function draw() {
    ctx.clearRect(0,0,800,450);
    drawBackground();
    ctx.fillStyle = '#151515'; ctx.fillRect(0, 430, 800, 20); ctx.fillRect(0, 0, 800, 20);
    objects.forEach(o => {
        let ox = o.x - frame + player.x;
        if(o.type === 'portal') { ctx.fillStyle = 'rgba(0,210,255,0.1)'; ctx.fillRect(ox, 0, o.w, 450); }
        else if(o.type === 'grav') { ctx.fillStyle = 'rgba(255,255,0,0.2)'; ctx.fillRect(ox, 0, o.w, 450); }
        else if(o.type === 'speed2') { ctx.fillStyle = 'rgba(0,255,0,0.3)'; ctx.fillRect(ox, 0, o.w, 450); }
        else if(o.type === 'speed4') { ctx.fillStyle = 'rgba(255,0,0,0.3)'; ctx.fillRect(ox, 0, o.w, 450); }
        else { ctx.fillStyle = o.type==='s' ? '#ff3333' : '#ffffff'; ctx.fillRect(ox, o.y, o.w, o.h); }
    });
    if(state === 'PLAYING') {
        ctx.fillStyle = playerColor; ctx.shadowBlur = 15; ctx.shadowColor = playerColor;
        if(mode === 'cube') ctx.fillRect(player.x, player.y, player.w, player.h);
        else if(mode === 'flappy') { ctx.beginPath(); ctx.arc(player.x+15, player.y+15, 14, 0, Math.PI*2); ctx.fill(); }
        else if(mode === 'wave') { 
            ctx.beginPath();
            if(gravity === 1) { ctx.moveTo(player.x, player.y+30); ctx.lineTo(player.x+30, player.y+15); ctx.lineTo(player.x, player.y); }
            else { ctx.moveTo(player.x, player.y); ctx.lineTo(player.x+30, player.y+15); ctx.lineTo(player.x, player.y+30); }
            ctx.fill();
        }
    }
    particles.forEach((p, i) => {
        ctx.globalAlpha = p.l; ctx.fillStyle = p.c;
        let sz = p.size || 4;
        ctx.fillRect(p.x+=p.vx, p.y+=p.vy, sz, sz);
        p.l -= 0.02; if(p.l <= 0) particles.splice(i, 1);
    });
    ctx.globalAlpha = 1;
}

function changeLevel(d) { lvlIdx = (lvlIdx + d + levels.length) % levels.length; document.getElementById('level-name').innerText = levels[lvlIdx].name; }

window.onkeydown = (e) => { 
    if(e.code === 'Space') { 
        e.preventDefault(); spaceHeld = true; jumpBuffered = true; 
        if(state === 'PLAYING' && mode === 'flappy') player.dy = -8 * gravity;
    } 
};
window.onkeyup = (e) => { if(e.code === 'Space') { spaceHeld = false; jumpBuffered = false; } };

update();
</script>
